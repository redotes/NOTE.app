    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(){
        var p = window.location.search.slice(1);
        if (p && p.indexOf('p=') === 0) {
          var path = decodeURIComponent(p.slice(2).replace(/&/g,'?').replace(/~/g,'&'));
          window.history.replaceState(null, null, '/' + path);
        }
      })();
    </script>
